<!DOCTYPE html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TKW</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            padding: 0;
            margin: 0;
        }
    </style>
</head>

<body>

    <!-- [迭代-v29] 移动端适配：窄视口（≤600px）时全屏遮罩，显示 logo + 提示文案 + 复制网址按钮 -->
    <div id="mobile-overlay" class="mobile-overlay" aria-hidden="true">
        <div class="mobile-overlay-inner">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 201.79 170.18" class="mobile-logo" aria-label="TKW logo">
                <path style="fill: #ffffff;"
                    d="m0,170.18c55.47-45.08,87.76-66.67,115.52-76.94,14.13-29.41,35.18-49.64,86.27-93.25-55.47,45.08-87.76,66.67-115.52,76.94-14.13,29.41-35.18,49.64-86.27,93.25Z" />
            </svg>
            <p class="mobile-message">手机浏览器未适配，作者努力中<span id="mobile-dots" class="mobile-dots">...</span></p>
            <button id="mobile-copy-btn" class="mobile-copy-btn">复制网址</button>
            <span id="mobile-copy-feedback" class="mobile-copy-feedback">已复制到剪贴板</span>
        </div>
    </div>

    <div
        style="width: 100vw;height: 100vh;position: fixed;z-index: -99;mix-blend-mode: soft-light;background: rgba(0, 0, 0, 0.457) ;pointer-events: none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" style="opacity: 0.6;">

            <filter id="noise" x="0" y="0" style="mix-blend-mode: screen;">
                <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="1" stitchTiles="stitch" />
                <feBlend mode="screen" />
            </filter>
            <rect width="100vw" height="100vh" filter="url(#noise)" />
        </svg>
    </div>

    <div id="zcbox" style="opacity: 0;">
        <!-- <div style="background-color: aqua;position: absolute;left: 50%;">菜单</div>
            <div style="background-color: rgb(255, 0, 208);">文案文案文案文案文案</div> -->
        <div id="zcbox2" style="pointer-events:none;">
            <div class="zcbox-visuals" aria-hidden="true">
                <div id="zc-center-guide" class="zc-center-guide"></div>
                <div id="zc-orbit-guide-1" class="zc-orbit-guide-line"></div>
                <div id="zc-orbit-guide-2" class="zc-orbit-guide-line"></div>
                <div id="zc-orbit-guide-3" class="zc-orbit-guide-line"></div>
                <div id="zc-solid-guide-1" class="zc-solid-guide-line"></div>
                <div id="zc-solid-guide-2" class="zc-solid-guide-line"></div>
                <div id="zc-solid-guide-3" class="zc-solid-guide-line"></div>
            </div>

            <!-- [迭代-v09] 三圆动画改为数据驱动结构，支持实时调参与关键帧编辑 -->
            <div id="zcyuan1" class="zcyuan" data-orbit="0">
                <div class="zcyuan-shell">
                    <div class="xxyuan">
                        <svg viewBox="0 0 200 200" class="dash-border">
                            <circle cx="100" cy="100" r="98" />
                        </svg>
                    </div>
                    <div class="zcyuan-label">01</div>
                    <div class="zxyuan-anchor">
                        <div id="zxyuan1" class="zxyuan zxyuan1"></div>
                        <div id="zcyuan1icon" class="orbit-icon" aria-hidden="true"></div>
                    </div>
                </div>
            </div>
            <div id="zcyuan2" class="zcyuan" data-orbit="1">
                <div class="zcyuan-shell">
                    <div class="xxyuan">
                        <svg viewBox="0 0 200 200" class="dash-border">
                            <circle cx="100" cy="100" r="98" />
                        </svg>
                    </div>
                    <div class="zcyuan-label">02</div>
                    <div class="zxyuan-anchor">
                        <div id="zxyuan2" class="zxyuan zxyuan2"></div>
                        <div id="zcyuan2icon" class="orbit-icon" aria-hidden="true"></div>
                    </div>
                </div>
            </div>
            <div id="zcyuan3" class="zcyuan" data-orbit="2">
                <div class="zcyuan-shell">
                    <div class="xxyuan">
                        <svg viewBox="0 0 200 200" class="dash-border">
                            <circle cx="100" cy="100" r="98" />
                        </svg>
                    </div>
                    <div class="zcyuan-label">03</div>
                    <div class="zxyuan-anchor">
                        <div id="zxyuan3" class="zxyuan zxyuan3"></div>
                        <div id="zcyuan3icon" class="orbit-icon" aria-hidden="true"></div>
                    </div>
                </div>
            </div>
            <!-- [迭代-v12] 三圆独立文案层脱离旋转容器，确保跟随圆心移动但文本始终保持正向 -->
            <div class="zc-copy-layer" aria-hidden="true">
                <div id="zc-copy-main-1" class="zc-copy zc-copy--main" data-layout="quadrants24">
                    <div class="zc-copy-main-tag"></div>
                    <div class="zc-copy-main-body"></div>
                </div>
                <div id="zc-copy-main-2" class="zc-copy zc-copy--main" data-layout="quadrants24">
                    <div class="zc-copy-main-tag"></div>
                    <div class="zc-copy-main-body"></div>
                </div>
                <div id="zc-copy-main-3" class="zc-copy zc-copy--main" data-layout="quadrants13">
                    <div class="zc-copy-main-tag"></div>
                    <div class="zc-copy-main-body"></div>
                </div>
                <div id="zc-copy-fixed-1" class="zc-copy zc-copy--fixed"></div>
                <div id="zc-copy-fixed-2" class="zc-copy zc-copy--fixed"></div>
                <div id="zc-copy-fixed-3" class="zc-copy zc-copy--fixed"></div>
            </div>
        </div>
        <!-- [迭代-v11] 圆弧 tap 与 zcbox 共用总圆心，直接控制三段关键帧 -->
        <div id="zc-arc-tap-wrap">
            <svg id="zc-arc-tap" viewBox="0 0 720 720" aria-label="脉络关键帧切换"></svg>
            <div id="zc-arc-tap-hotspots" aria-hidden="true">
                <button class="zc-arc-tap-button" data-tap-id="a" type="button" tabindex="-1">品牌认知</button>
                <button class="zc-arc-tap-button" data-tap-id="b" type="button" tabindex="-1">开发迭代</button>
                <button class="zc-arc-tap-button" data-tap-id="c" type="button" tabindex="-1">原型设计</button>
            </div>
        </div>
    </div>

    <!-- [迭代-v09] 临时调试浮窗支持最小化、可视化维度开关、实时调参与关键帧保存 -->
    <!-- [迭代-v28] 调试面板入口及背景全部隐藏 -->
    <aside id="zc-debug-panel" class="zc-debug-panel zc-debug-panel--collapsed" style="display:none">
        <!-- [迭代-v28] 调试入口隐藏 -->
        <button id="zc-debug-toggle" class="zc-debug-toggle" type="button" aria-expanded="false" style="display:none">
            动画调试
        </button>
        <div class="zc-debug-content">
            <div class="zc-debug-row">
                <button id="zc-debug-play" class="zc-debug-button" type="button">播放当前帧</button>
                <button id="zc-debug-reverse" class="zc-debug-button" type="button">回放</button>
            </div>
            <div class="zc-debug-row">
                <button id="zc-debug-prev" class="zc-debug-button" type="button">上一帧</button>
                <button id="zc-debug-next" class="zc-debug-button" type="button">下一帧</button>
            </div>
            <label class="zc-debug-field">
                <span>进度</span>
                <input id="zc-progress" type="range" min="0" max="100" value="0">
                <output id="zc-progress-value">0%</output>
            </label>
            <label class="zc-debug-field">
                <span>时长</span>
                <input id="zc-duration" type="range" min="400" max="4000" step="50" value="1600">
                <output id="zc-duration-value">1600ms</output>
            </label>
            <div class="zc-debug-orbit-picker" role="tablist" aria-label="选择圆轨道">
                <button id="zc-orbit-button-0" class="zc-debug-orbit-button" type="button" data-orbit-index="0">圆 01</button>
                <button id="zc-orbit-button-1" class="zc-debug-orbit-button" type="button" data-orbit-index="1">圆 02</button>
                <button id="zc-orbit-button-2" class="zc-debug-orbit-button" type="button" data-orbit-index="2">圆 03</button>
            </div>
            <div id="zc-orbit-active-label" class="zc-debug-orbit-active">当前编辑：圆 01</div>

            <div class="zc-debug-section" data-section-key="visuals">
                <button class="zc-debug-section-toggle" type="button" aria-expanded="true">
                    <span class="zc-debug-section-title">可视化</span>
                </button>
                <div class="zc-debug-section-body">
                    <label><input id="zc-visual-center" type="checkbox" checked> 总圆心</label>
                    <label><input id="zc-visual-orbits" type="checkbox" checked> 轨道半径</label>
                    <label><input id="zc-visual-solid" type="checkbox" checked> 实心圆到总圆心</label>
                    <label><input id="zc-visual-tangents" type="checkbox" checked> 切线</label>
                    <label><input id="zc-visual-labels" type="checkbox"> 参数标签</label>
                </div>
            </div>

            <div class="zc-debug-section" data-section-key="orbit">
                <button class="zc-debug-section-toggle" type="button" aria-expanded="true">
                    <span class="zc-debug-section-title">轨道控制</span>
                </button>
                <div class="zc-debug-section-body">
                    <label class="zc-debug-field">
                        <span>角度</span>
                        <input id="zc-control-angle" type="range" min="-180" max="360" step="1">
                        <output id="zc-control-angle-value"></output>
                    </label>
                    <label class="zc-debug-field">
                        <span>轨道半径</span>
                        <input id="zc-control-orbit-radius" type="range" min="0" max="320" step="1">
                        <output id="zc-control-orbit-radius-value"></output>
                    </label>
                    <label class="zc-debug-field">
                        <span>虚线圆半径</span>
                        <input id="zc-control-ring-radius" type="range" min="24" max="160" step="1">
                        <output id="zc-control-ring-radius-value"></output>
                    </label>
                    <label class="zc-debug-field">
                        <span>虚线圆显隐</span>
                        <input id="zc-control-ring-opacity" type="range" min="0" max="1" step="0.01">
                        <output id="zc-control-ring-opacity-value"></output>
                    </label>
                    <label class="zc-debug-field">
                        <span>实心圆直径</span>
                        <input id="zc-control-solid-size" type="range" min="12" max="200" step="1">
                        <output id="zc-control-solid-size-value"></output>
                    </label>
                    <label class="zc-debug-field">
                        <span>实心圆距总圆心</span>
                        <input id="zc-control-center-distance" type="range" min="0" max="320" step="1">
                        <output id="zc-control-center-distance-value"></output>
                    </label>
                    <label class="zc-debug-field">
                        <span>实心圆透明度</span>
                        <input id="zc-control-solid-opacity" type="range" min="0" max="1" step="0.01">
                        <output id="zc-control-solid-opacity-value"></output>
                    </label>
                    <label class="zc-debug-field">
                        <span>图标</span>
                        <select id="zc-control-icon-type">
                            <option value="plus">+</option>
                            <option value="minus">—</option>
                        </select>
                    </label>
                    <label><input id="zc-control-icon-visible" type="checkbox" checked> 显示图标</label>
                </div>
            </div>

            <div class="zc-debug-section" data-section-key="main-copy">
                <button class="zc-debug-section-toggle" type="button" aria-expanded="true">
                    <span class="zc-debug-section-title">主文案</span>
                </button>
                <div class="zc-debug-section-body">
                    <label class="zc-debug-field">
                        <span>排版样式</span>
                        <select id="zc-copy-layout">
                            <option value="quadrants24">二四象限排版</option>
                            <option value="quadrants13">一三象限排版</option>
                        </select>
                    </label>
                    <label class="zc-debug-field">
                        <span>相对角度</span>
                        <input id="zc-copy-angle" type="range" min="-180" max="360" step="1">
                        <output id="zc-copy-angle-value"></output>
                    </label>
                    <label class="zc-debug-field">
                        <span>相对距离</span>
                        <input id="zc-copy-distance" type="range" min="0" max="320" step="1">
                        <output id="zc-copy-distance-value"></output>
                    </label>
                    <label class="zc-debug-field">
                        <span>标题</span>
                        <select id="zc-copy-title">
                            <option value="形式">形式</option>
                            <option value="方法">方法</option>
                            <option value="目标">目标</option>
                        </select>
                    </label>
                    <label class="zc-debug-field">
                        <span>正文</span>
                        <textarea id="zc-copy-body" class="zc-copy-textarea" spellcheck="false"></textarea>
                    </label>
                </div>
            </div>

            <div class="zc-debug-section" data-section-key="fixed-copy">
                <button class="zc-debug-section-toggle" type="button" aria-expanded="true">
                    <span class="zc-debug-section-title">固定文案</span>
                </button>
                <div class="zc-debug-section-body">
                    <p class="zc-debug-hint">仅在当前轨道虚线圆显隐大于 0 时显示，内容为全局固定，不跟关键帧切换。</p>
                    <label class="zc-debug-field">
                        <span>固定内容</span>
                        <input id="zc-fixed-copy-text" type="text">
                    </label>
                    <label class="zc-debug-field">
                        <span>相对角度</span>
                        <input id="zc-fixed-copy-angle" type="range" min="-180" max="360" step="1">
                        <output id="zc-fixed-copy-angle-value"></output>
                    </label>
                    <label class="zc-debug-field">
                        <span>相对距离</span>
                        <input id="zc-fixed-copy-distance" type="range" min="0" max="240" step="1">
                        <output id="zc-fixed-copy-distance-value"></output>
                    </label>
                </div>
            </div>

            <div class="zc-debug-section" data-section-key="tap">
                <button class="zc-debug-section-toggle" type="button" aria-expanded="false">
                    <span class="zc-debug-section-title">Tap 组件</span>
                </button>
                <div class="zc-debug-section-body">
                    <label class="zc-debug-field">
                        <span>避让间距</span>
                        <input id="zc-tap-clearance" type="range" min="-40" max="120" step="1">
                        <output id="zc-tap-clearance-value"></output>
                    </label>
                    <label class="zc-debug-field">
                        <span>半径微调</span>
                        <input id="zc-tap-radius-offset" type="range" min="-120" max="120" step="1">
                        <output id="zc-tap-radius-offset-value"></output>
                    </label>
                    <label class="zc-debug-field">
                        <span>弧线宽度</span>
                        <input id="zc-tap-track-width" type="range" min="24" max="120" step="1">
                        <output id="zc-tap-track-width-value"></output>
                    </label>
                    <label class="zc-debug-field">
                        <span>起始角</span>
                        <input id="zc-tap-start-angle" type="range" min="-180" max="240" step="1">
                        <output id="zc-tap-start-angle-value"></output>
                    </label>
                    <label class="zc-debug-field">
                        <span>当前半径</span>
                        <output id="zc-tap-computed-radius">0px</output>
                    </label>
                </div>
            </div>

            <div class="zc-debug-section" data-section-key="tap-config">
                <button class="zc-debug-section-toggle" type="button" aria-expanded="false">
                    <span class="zc-debug-section-title">Tap 全量配置</span>
                </button>
                <div class="zc-debug-section-body">
                    <p class="zc-debug-hint">结构参考 test3，可直接改 `placement / component / items`，点应用即时生效。</p>
                    <textarea id="zc-tap-config-json" class="zc-json-output zc-json-output--editable" spellcheck="false"></textarea>
                    <div class="zc-debug-row zc-debug-row--dense">
                        <button id="zc-tap-config-apply" class="zc-debug-button" type="button">应用配置</button>
                        <button id="zc-tap-config-refresh" class="zc-debug-button" type="button">回填当前</button>
                        <button id="zc-tap-config-reset" class="zc-debug-button" type="button">恢复默认</button>
                    </div>
                    <div id="zc-tap-config-status" class="zc-debug-status" aria-live="polite"></div>
                </div>
            </div>

            <div class="zc-debug-section" data-section-key="keyframes">
                <button class="zc-debug-section-toggle" type="button" aria-expanded="true">
                    <span class="zc-debug-section-title">关键帧</span>
                </button>
                <div class="zc-debug-section-body">
                    <select id="zc-keyframe-list" class="zc-keyframe-list" size="3"></select>
                    <div class="zc-debug-row zc-debug-row--dense">
                        <button id="zc-keyframe-save" class="zc-debug-button" type="button">保存当前帧</button>
                        <button id="zc-keyframe-reset" class="zc-debug-button" type="button">恢复默认</button>
                    </div>
                </div>
            </div>

            <div class="zc-debug-section" data-section-key="json">
                <button class="zc-debug-section-toggle" type="button" aria-expanded="false">
                    <span class="zc-debug-section-title">JSON</span>
                </button>
                <div class="zc-debug-section-body">
                    <textarea id="zc-keyframe-json" class="zc-json-output" readonly spellcheck="false"></textarea>
                    <button id="zc-keyframe-copy" class="zc-debug-button" type="button">复制 JSON</button>
                </div>
            </div>
        </div>
    </aside>

            </div>

    <!-- [迭代-v29] 移动端适配：复制网址按钮逻辑 -->
    <script>
        (function () {
            var btn = document.getElementById('mobile-copy-btn');
            var fb = document.getElementById('mobile-copy-feedback');
            var timer = null;
            btn.addEventListener('click', function () {
                var url = window.location.href;
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(url).then(function () {
                        showFeedback();
                    }).catch(function () {
                        fallbackCopy(url);
                    });
                } else {
                    fallbackCopy(url);
                }
            });
            function showFeedback() {
                fb.classList.add('show');
                if (timer) clearTimeout(timer);
                timer = setTimeout(function () {
                    fb.classList.remove('show');
                }, 1800);
            }
            function fallbackCopy(text) {
                var ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand('copy'); showFeedback(); } catch (e) { }
                document.body.removeChild(ta);
            }
        })();

        /* [迭代-v29] 省略号逐点增长动画："." → ".." → "..." 循环 */
        (function () {
            var dots = document.getElementById('mobile-dots');
            if (!dots) return;
            var states = ['', '.', '..', '...'];
            var idx = 0;
            dots.textContent = states[0];
            setInterval(function () {
                idx = (idx + 1) % states.length;
                dots.textContent = states[idx];
            }, 400);
        })();
    </script>
